server:
  port: ${PORT:8080}

spring:
  application:
    name: proxy-monitoring-backend
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - https://localhost:3000
      - https://localhost:5173
      - https://monitoreo-de-microservicios-fronen.vercel.app
    allowed-origin-patterns:
      - https://monitoreo-de-microservicios-fronen*.vercel.app
